name: Deploy to OCI

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'lessons/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'tailwind.config.js'
      - 'postcss.config.js'
      - 'package.json'
      - 'bun.lock'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install Bun ───────────────────────────────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ── 4. Type-check ────────────────────────────────────────────────────
      - name: Type check
        run: bun run typecheck

      # ── 5. Build Vite SPA → dist/ ─────────────────────────────────────────
      - name: Build client
        run: bun run build

      # ── 6. Setup SSH key ─────────────────────────────────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_PRIVATE_KEY }}" > ~/.ssh/oci_deploy
          chmod 600 ~/.ssh/oci_deploy
          ssh-keyscan -H ${{ secrets.OCI_HOST }} >> ~/.ssh/known_hosts

      # ── 7. Sync files to OCI (rsync) ─────────────────────────────────────
      - name: Sync files to OCI
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude '.DS_Store' \
            --exclude '.env*' \
            --exclude '*.local' \
            -e "ssh -i ~/.ssh/oci_deploy -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:~/lang-mirror/

      # ── 8. Install deps + restart service on OCI ─────────────────────────
      - name: Deploy on OCI
        run: |
          ssh -i ~/.ssh/oci_deploy \
              -o StrictHostKeyChecking=no \
              ${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }} << 'ENDSSH'
            set -e
            cd ~/lang-mirror

            echo "→ Installing production dependencies..."
            ~/.bun/bin/bun install --production --frozen-lockfile

            echo "→ Restarting lang-mirror service..."
            sudo systemctl restart lang-mirror

            echo "→ Waiting for service to come up..."
            sleep 3
            sudo systemctl is-active --quiet lang-mirror \
              && echo "✅ lang-mirror is running" \
              || (echo "❌ Service failed to start" && sudo journalctl -u lang-mirror -n 30 && exit 1)
          ENDSSH

      # ── 9. Health check ───────────────────────────────────────────────────
      - name: Health check
        run: |
          sleep 5
          curl -f --max-time 10 \
            --retry 3 --retry-delay 3 \
            https://${{ secrets.OCI_HOST }}/api/health \
            && echo "✅ Health check passed" \
            || echo "⚠️  Health check skipped (no domain yet)"
        continue-on-error: true
