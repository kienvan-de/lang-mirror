<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lang Mirror Today</title>
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      /* Inline splash screen — visible instantly, hidden once React mounts.
         Matches the app's bg color for both light and dark modes. */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f3f4f6;
        z-index: 99999;
        transition: opacity 0.3s ease-out;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash img { width: 56px; height: 56px; object-fit: contain; }
      #splash p { margin-top: 12px; font-family: system-ui, sans-serif; font-size: 14px; color: #6b7280; }
      #splash .spinner {
        margin-top: 20px;
        width: 24px; height: 24px;
        border: 2px solid #d1d5db;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @media (prefers-color-scheme: dark) {
        #splash { background: #0a0f1a; }
        #splash p { color: #9ca3af; }
        #splash .spinner { border-color: #374151; border-top-color: #60a5fa; }
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Sync dark-mode + body bg: runs before first paint so there's never a
         white flash. Sets .dark class on <html> and body background color. -->
    <script>
      (function(){
        var d=document.documentElement,t=localStorage.getItem('theme');
        var dark=t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches);
        if(dark) d.classList.add('dark');
        document.body.style.background=dark?'#0a0f1a':'#f3f4f6';
      })();
    </script>
    <!-- Splash screen: rendered by HTML, no JS needed. React removes it after mount. -->
    <div id="splash">
      <img src="/logo.png" alt="Lang Mirror Today" />
      <p>Lang Mirror Today</p>
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
